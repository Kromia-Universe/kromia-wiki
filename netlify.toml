# Netlify configuration for VitePress deployment

[build]
  publish = "docs/.vitepress/dist"
  command = "npm run docs:build"

# Node.js version
[build.environment]
  NODE_VERSION = "18"

# Headers for security and PWA
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rules
[[redirects]]
  from = "/regulament"
  to = "/regulament/"
  status = 301

[[redirects]]
  from = "/ghiduri"
  to = "/ghiduri/"
  status = 301

[[redirects]]
  from = "/joburi"
  to = "/joburi/"
  status = 301

[[redirects]]
  from = "/comenzi"
  to = "/comenzi/"
  status = 301

# 404 handling
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404